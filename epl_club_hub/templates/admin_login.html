{% extends "base.html" %}

{% block title %}관리자 로그인 | EPL Club Hub{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card" style="max-width: 520px; margin: 0 auto;">
        <h2>관리자 로그인</h2>
        <p class="form-desc">관리 기능은 관리자만 사용할 수 있어.</p>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login" class="player-form">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn">로그인</button>
                <a href="/" class="cancel-btn">메인으로</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
